<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Controle de Volume</title>
    <link rel="stylesheet" href="../utils/spotify-theme.css">
</head>
<body>
    <div class="container fade-in">
        <h2>🔊 Controle de Volume</h2>
        
        <div id="device-section" style="display: none;">
            <div class="form-group">
                <label for="device">Dispositivo</label>
                <select id="device">
                    <option value="">Carregando...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="step">Passo do volume</label>
                <input type="number" id="step" min="1" max="100" value="5" style="width: 100%; padding: 8px; background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; font-size: 14px;">
                <div class="help-text">Valor de 1 a 100. Ex: 5 = aumenta/diminui de 5 em 5</div>
            </div>

            <button id="refreshBtn" class="secondary">🔄 Atualizar</button>
        </div>

        <div id="auth-buttons">
            <div class="auth-container">
                <button id="login-btn" class="btn btn-primary btn-login">
                    <span class="icon">🔐</span>
                    <span class="text">Fazer Login</span>
                </button>
                <div class="auth-info">
                    <p>Clique para autenticação com Spotify</p>
                </div>
                <div id="auth-message" class="auth-message"></div>
            </div>
        </div>

        <div id="message" class="message info" style="display: none;"></div>
    </div>

    <script src="../utils/common.js"></script>
    <script src="../utils/auth-manager.js"></script>
    <script src="../utils/login-button.js"></script>
    <script src="index.js"></script>
</body>
</html>
